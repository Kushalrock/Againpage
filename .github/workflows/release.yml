name: Release

# Build the reader desktop app for macOS, Windows, and Linux on every version
# tag and attach the installers to a draft GitHub release. The reader is the
# default (reader-only) Tauri build — no bundled engine — so no PyInstaller /
# Postgres assets are required; run the engine separately with Docker.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # .dmg / .app (universal per runner arch)
          - platform: ubuntu-latest     # .AppImage / .deb
          - platform: windows-latest    # .exe (NSIS) / .msi
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build & release the reader app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Againpage ${{ github.ref_name }}"
          releaseBody: |
            Againpage reader desktop app (alpha).

            Run the engine separately (Postgres + API + worker):
            `docker compose up --build -d` — then open the reader and point it at
            the engine (defaults to http://localhost:8000).
          releaseDraft: true
          prerelease: true

  # Build the reader as a signed Android APK and attach it to the same draft
  # release the `build` job created. Requires four repo secrets:
  # ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
  # ANDROID_KEY_PASSWORD. Only meaningful on a `v*` tag push (workflow_dispatch
  # has no release to upload to).
  android:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (platform 36 + NDK)
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Write keystore + keystore.properties from secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/againpage-release.jks"
          cat > desktop/src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/againpage-release.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF

      - name: Build signed APK
        # ANDROID_HOME is injected by the runner; the NDK version below matches
        # the one installed in the SDK-packages step. ${{ env.* }} can't see
        # runner-injected vars, so resolve NDK_HOME from the shell at run time.
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.1.12297006"
          pnpm --filter desktop exec tauri android build --apk

      - name: Upload APK to the draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
          APK=$(find desktop/src-tauri/gen/android -path '*apk*release*.apk' | grep -v unsigned | head -n1)
          cp "$APK" "Againpage_${VERSION}_android.apk"
          gh release upload "${{ github.ref_name }}" "Againpage_${VERSION}_android.apk" --clobber
