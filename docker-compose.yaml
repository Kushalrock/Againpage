# Againpage engine (Postgres + API + worker) — deploy this anywhere:
#
#   VAULT_PATH=/abs/path/to/notes  docker compose up --build -d
#   (provider, models, and API key are entered in the reader UI, not here)
#
# The API binds 127.0.0.1:8000 (loopback ONLY — never the public interface);
# Postgres is not published to the host at all. The reader is a separate,
# downloadable desktop app pointed at the engine's URL via its "Engine URL"
# setting:
#   - all-in-one machine → http://localhost:8000 (works out of the box).
#   - server / home lab   → expose it on your private tailnet with
#     `tailscale serve --bg 8000` and use the https://<host>.<tailnet>.ts.net
#     URL, or bind the API to the tailnet IP. Do NOT publish it on 0.0.0.0:
#     the API is unauthenticated. Set POSTGRES_PASSWORD (env/.env) on a server.
#
# Notes:
# - Put OPENROUTER_API_KEY in the shell env or an `.env` beside this file, or
#   just enter keys in the reader's settings instead.
# - VAULT_PATH bind-mounts your notes (read-only) into the engine at /vault, so
#   set the reader's notes folder to /vault. It must be a path on THIS host
#   (Docker can't see unmounted paths); for a network share, mount it on the
#   host first and point VAULT_PATH at that mount. Defaults to ./notes if unset.
# - Multiple note folders: point VAULT_PATH at a common parent and add each
#   subfolder in the reader, OR add more bind mounts (e.g. `- /host/other:/vault2:ro`
#   under BOTH api and worker below) and add /vault2 in the reader.
# - For a host-run Ollama, set the Ollama endpoint to
#   http://host.docker.internal:11434 (fully local, off the network).
# - The API is unauthenticated (single-user) — keep it on a trusted LAN / VPN.
services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: againpage
    # Not published to the host: the API/worker reach it over the compose
    # network as db:5432. For local psql use `docker compose exec db psql -U postgres`.
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d againpage"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: { context: ./engine }
    command: ["againpage-api"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@db:5432/againpage
      AGAINPAGE_API_HOST: 0.0.0.0
      AGAINPAGE_API_PORT: "8000"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    # Loopback only — NOT the public interface. On a server, expose it on your
    # private tailnet with `tailscale serve --bg 8000` (see README), or bind to
    # the tailnet IP. For an all-in-one machine the reader reaches localhost:8000.
    ports: ["127.0.0.1:8000:8000"]
    # The API scans the vault for /status note counts and can test a host Ollama,
    # so it needs the same mount + host gateway as the worker.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${VAULT_PATH:-./notes}:/vault:ro
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      # api owns schema migrations on boot; gating the worker on api-healthy
      # avoids two processes racing to migrate on first start.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/status').status==200 else 1)"]
      interval: 4s
      timeout: 4s
      retries: 30
      start_period: 20s

  worker:
    # Keep this a SINGLE replica — reclaim_stale() requeues any 'running' job at
    # startup, which is only safe when no other worker is concurrently running.
    build: { context: ./engine }
    command: ["againpage-worker"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@db:5432/againpage
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${VAULT_PATH:-./notes}:/vault:ro
    depends_on:
      db: { condition: service_healthy }
      api: { condition: service_healthy }

volumes:
  pgdata: {}
